crypto:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('PG_HOST', 'localhost') }}"
      port: "{{ env_var('PG_PORT', 5432) | int }}"
      user: "{{ env_var('PG_USER', 'dbt') }}"
      password: "{{ env_var('PG_PASSWORD', 'dbt') }}"
      dbname: "{{ env_var('PG_DB', 'warehouse') }}"
      schema: analytics
      threads: 4
